<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUSH POP array types</title>
    <!-- BOOTSRAP LINK -->
 
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
 
    <!-- SCRIPT LINK  -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="main-conatanier" style="justify-content: center; align-items: center; display: flex;">
    <div class="cont p-3">
      <div class="display f-w" id="display"></div>
    </div>
    <div class="contq p-5 ">
    <button class="btn bg-primary text-white" onclick="addStudent()">
      ADD student
    </button>
    <button class="btn bg-secondary text-white" onclick="removeStudent()">
      remove student  
    </button>
    <div class="contr p-4">
    <button class="btn bg-primary text-white" onclick="frontunshift()">
     unshift
    </button>
    <button class="btn bg-secondary text-white" onclick="frontshift()">
     shift
    </button>
    </div>
    </div>
    </div>
    <script>
      let students = ["Ram", "shyam", "jay"];
      let display = students;
      document.getElementById("display").innerHTML = display;
 
      function addStudent() {
        let student = prompt();
        students.push(student);
        document.getElementById("display").innerHTML = display;
      }
      function removeStudent() {
        students.pop();
        document.getElementById("display").innerHTML = display;
      }
      function frontunshift() {
        let student = prompt();
        students.unshift(student);
        document.getElementById("display").innerHTML = display;
      }
      function frontshift() {
        students.shift();
        document.getElementById("display").innerHTML = display;
      }
 
    </script>
  </body>
</html>
