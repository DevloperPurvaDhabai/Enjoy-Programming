<html>

<head>
    <title>Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .height-1 {
            height: 110px;
        }

        .height-2 {
            height: 150px;
        }

        .height-3 {
            height: 450px;
        }
    </style>
</head>

<body>
    <div class="row">
        <!--Top-->
        <div class="col-6 border bg-primary height-1" ></div>
            <div class="col-6 border bg-primary height-1"></div>

            <!--Bottom-->
            <div class="col-3 border bg-primary height-3">
                <div class="col-12 border bg-primary height-2"></div>
                <div class="col-12 border bg-primary height-2"></div>
                <div class="col-12 border bg-primary height-2"></div>
            </div>
            <div class="col-6 border bg-primary height-3"></div>
            <div class="col-3 border bg-primary height-3">
                <div class="col-12 border bg-primary height-2"></div>
                <div class="col-12 border bg-primary height-2"></div>
                <div class="col-12 border bg-primary height-2"></div>
            </div>
        </div>
</body>

</html>
