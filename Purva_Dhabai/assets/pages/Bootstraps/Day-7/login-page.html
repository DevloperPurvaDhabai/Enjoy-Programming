<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--Bootstrap css link start-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!--Bootstrap css link end-->
  </head>
  <body>
    <div
      class="container-fluid vh-100 d-flex justify-content-center align-items-center row"
    >
      <div class="card p-4 shadow col-md-5">
        <h3 class="text-center mb-3 fw-bold">Login</h3>

        <form>
          <!--Username-->
          <div class="mb-3">
            <label class="form-label">Full Username</label>
            <input
              class="form-control"
              type="text"
              placeholder="Enter your Username"
            />
          </div>

          <!--Password-->
          <div class="mb-3">
            <label class="form-label">Enter Password</label>
            <input
              class="form-control"
              type="text"
              placeholder="Enter your Password"
            />
          </div>

          <!--Forgot Password-->
          <div class="mb-3">
            <div class="form-label text-end w-100 text-primary">
              <u>Forgot Password</u>
            </div>
          </div>

          <!--Button-->
          <div class="d-grid">
            <button class="btn btn-success" type="submit">Login</button>
          </div>

          <!--Signup-->
          <div class="mt-3">
            <div class="text-center w-100">
              Don't have an account<u class="text-primary">Signup</u>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!--Bootstrap JS link start-->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!--Bootstrap JS link end-->
  </body>
</html>
